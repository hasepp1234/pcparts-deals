name: Daily price update

# 2026-07-11: 自動cronは無効化した。
# 理由: 楽天API側がこのアプリ(Web Application登録、Allowed websitesはドメイン制限)を
# データセンターIP(GitHub Actionsのホストランナー)からの機械的アクセスとして扱い、
# 403エラーにはならないが検索結果が常にhits=0になる問題を確認したため。
# 代わりにオーナーPC(タスクスケジューラ、スケジュールを逃したら次回起動時に実行)から
# fetch_prices.py→detect_deals.py→build.py→git pushする運用に切り替えた。
# このワークフローはworkflow_dispatch（手動実行）のみ残し、動作確認や将来の
# 環境見直し時の検証用に保持する。
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch prices from Rakuten API
        env:
          RAKUTEN_APPLICATION_ID: ${{ secrets.RAKUTEN_APPLICATION_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
        run: python3 scripts/fetch_prices.py

      - name: Detect deals
        run: python3 scripts/detect_deals.py

      - name: Build site
        run: python3 scripts/build.py

      - name: Commit and push updated data/site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data public
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Manual (workflow_dispatch) update: prices/deals/site $(date -u +'%Y-%m-%d')"
            git push
          fi
