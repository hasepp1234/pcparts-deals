name: Daily price update

on:
  schedule:
    # 毎日 22:00 UTC = 日本時間 7:00 に実行
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch prices from Rakuten API
        env:
          RAKUTEN_APPLICATION_ID: ${{ secrets.RAKUTEN_APPLICATION_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
        run: python3 scripts/fetch_prices.py

      - name: Detect deals
        run: python3 scripts/detect_deals.py

      - name: Build site
        run: python3 scripts/build.py

      - name: Commit and push updated data/site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data public
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily auto update: prices/deals/site $(date -u +'%Y-%m-%d')"
            git push
          fi
